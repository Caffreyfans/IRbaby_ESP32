name: Build and Release IRbaby Firmware

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.4

    strategy:
      fail-fast: false
      matrix:
        target:
          - esp32
          - esp32c2
          - esp32c3
          - esp32c6
          - esp32h2
          - esp32p4
          - esp32s2
          - esp32s3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Configure Git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build firmware
        shell: bash
        run: |
          set -euo pipefail
          . /opt/esp/idf/export.sh

          target="${{ matrix.target }}"
          build_dir="build_${target}"

          idf.py -B "${build_dir}" set-target "${target}"
          idf.py -B "${build_dir}" build
          idf.py -B "${build_dir}" merge-bin

          mkdir -p artifacts
          cp "${build_dir}/merged-binary.bin" "artifacts/IRbaby_${target}_merged.bin"
          cp "${build_dir}/ir_protocols.bin" "artifacts/IRbaby_${target}_app.bin"
          cp "${build_dir}/bootloader/bootloader.bin" "artifacts/IRbaby_${target}_bootloader.bin"
          cp "${build_dir}/partition_table/partition-table.bin" "artifacts/IRbaby_${target}_partition-table.bin"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v6
        with:
          name: IRbaby-${{ matrix.target }}
          path: artifacts/*.bin
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*.bin
          generate_release_notes: true
