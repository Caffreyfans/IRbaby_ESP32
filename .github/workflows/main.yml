name: Build IRbaby Firmware

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.4

    strategy:
      fail-fast: false
      matrix:
        target:
          - esp32
          - esp32c2
          - esp32c3
          - esp32c6
          - esp32h2
          - esp32p4
          - esp32s2
          - esp32s3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Configure Git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build firmware
        shell: bash
        run: |
          set -euo pipefail
          . /opt/esp/idf/export.sh

          target="${{ matrix.target }}"
          build_dir="build_${target}"

          idf.py -B "${build_dir}" set-target "${target}"
          idf.py -B "${build_dir}" build
          idf.py -B "${build_dir}" merge-bin

          mkdir -p artifacts
          cp "${build_dir}/merged-binary.bin" "artifacts/IRbaby_${target}_merged.bin"
          cp "${build_dir}/ir_protocols.bin" "artifacts/IRbaby_${target}_app.bin"
          cp "${build_dir}/bootloader/bootloader.bin" "artifacts/IRbaby_${target}_bootloader.bin"
          cp "${build_dir}/partition_table/partition-table.bin" "artifacts/IRbaby_${target}_partition-table.bin"

      - name: Upload firmware artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v6
        with:
          name: IRbaby-${{ matrix.target }}
          path: artifacts/*.bin
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download firmware artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-artifacts

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --sort=-v:refname | grep -v "^${tag_name}$" | head -n 1 || true)"

          {
            echo "## IRbaby ESP32 ${tag_name}"
            echo
            echo "### 固件目标"
            echo "- ESP32"
            echo "- ESP32-S2"
            echo "- ESP32-S3"
            echo "- ESP32-C2"
            echo "- ESP32-C3"
            echo "- ESP32-C6"
            echo "- ESP32-H2"
            echo "- ESP32-P4"
            echo
            echo "### 文件说明"
            echo "- \`IRbaby_<target>_merged.bin\`: 推荐刷写的完整固件"
            echo "- \`IRbaby_<target>_app.bin\`: 应用固件"
            echo "- \`IRbaby_<target>_bootloader.bin\`: bootloader"
            echo "- \`IRbaby_<target>_partition-table.bin\`: 分区表"
            echo
            echo "### 兼容说明"
            echo "- ESP32-H2 和 ESP32-P4 没有内置 Wi-Fi，固件会跳过 Web、MQTT、OTA、HomeKit 等网络功能。"
            echo "- ESP32-C2 可生成带网络服务的固件；当前目标没有可用 RMT 外设时，红外收发会安全降级为日志提示。"
            echo
            echo "### 完整变更"
            if [ -n "${previous_tag}" ]; then
              echo "- ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${previous_tag}...${tag_name}"
            else
              echo "- ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commits/${tag_name}"
            fi
          } > release-notes.md

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/**/*.bin
          body_path: release-notes.md
